<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 90" fill="none">
  <!-- Ring band (outer ellipse) -->
  <ellipse cx="52" cy="62" rx="28" ry="14" stroke="#C2185B" stroke-width="4.5" fill="none"/>
  <!-- Ring shank left -->
  <path d="M24 62 Q24 52 38 46" stroke="#C2185B" stroke-width="4.5" fill="none" stroke-linecap="round"/>
  <!-- Ring shank right -->
  <path d="M80 62 Q80 52 66 46" stroke="#C2185B" stroke-width="4.5" fill="none" stroke-linecap="round"/>
  <!-- Diamond shape -->
  <polygon points="52,14 67,28 52,46 37,28" fill="#C2185B"/>
  <!-- Diamond top facets -->
  <line x1="52" y1="14" x2="52" y2="28" stroke="#B0004A" stroke-width="1.2"/>
  <line x1="37" y1="28" x2="67" y2="28" stroke="#B0004A" stroke-width="1.2"/>
  <line x1="44" y1="21" x2="60" y2="21" stroke="#D64B8A" stroke-width="0.8"/>
  <!-- Sparkle top-left -->
  <g fill="#C2185B">
    <rect x="21" y="13" width="3" height="3" rx="0.5" transform="rotate(45 22.5 14.5)"/>
    <rect x="12" y="20" width="2" height="2" rx="0.4" transform="rotate(45 13 21)"/>
  </g>
  <!-- Sparkle top-right -->
  <rect x="69" y="10" width="2.5" height="2.5" rx="0.4" fill="#C2185B" transform="rotate(45 70.25 11.25)"/>

  <!-- RishtaBook text in serif italic style -->
  <text x="110" y="62" font-family="Georgia, 'Times New Roman', serif" font-size="46" font-style="italic" font-weight="700" fill="#C2185B" letter-spacing="-1">RishtaBook</text>
</svg>
